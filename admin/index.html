<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOLO HAPPY 内容管理</title>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("yolo.admin.theme") || "system";
          var resolved = pref;
          if (pref === "system") {
            resolved =
              typeof matchMedia !== "undefined" && matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.dataset.theme = resolved;
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
    <link rel="stylesheet" href="css/admin.css?v=31" />
  </head>
  <body>
  <div id="login-screen" class="login-wrap">
    <div class="login-card">
      <div class="login-card-header">
        <h1>YOLO HAPPY <span style="color: var(--accent)">CMS</span></h1>
        <button type="button" class="btn btn-secondary btn-sm" id="login-theme-toggle" title="切换主题" aria-label="切换主题">◐</button>
      </div>
      <p>使用 Supabase 管理员账号登录</p>
      <div id="login-error" class="status-bar error hidden"></div>
      <form id="login-form">
        <label for="login-email">邮箱</label>
        <input id="login-email" type="email" autocomplete="username" required />

        <label for="login-password">密码</label>
        <input id="login-password" type="password" autocomplete="current-password" required />

        <button type="submit" class="btn" style="width: 100%; margin-top: 8px">登录</button>
      </form>
    </div>
  </div>

  <div id="app-screen" class="app-shell hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">YOLO <span>HAPPY</span> CMS</div>
      <div class="sidebar-tools">
        <input type="search" id="nav-filter" class="nav-filter-input" placeholder="搜索城市、景点…" autocomplete="off" />
        <button type="button" class="btn btn-secondary btn-sm theme-toggle-btn" id="theme-toggle" title="主题：跟随系统" aria-label="切换主题">◐</button>
      </div>
      <div id="sidebar-nav" class="sidebar-nav-wrap"></div>
      <div class="sidebar-footer">
        <div id="user-email"></div>
        <button type="button" class="btn btn-secondary btn-sm" id="logout-btn" style="margin-top: 8px; width: 100%">
          退出
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h2 id="page-title">内容管理</h2>
        <button type="button" class="btn" id="add-row-btn">+ 新建</button>
      </div>
      <div id="main-content"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="js/config.js?v=26"></script>
  <script src="js/core.js?v=26"></script>
  <script src="js/preferences.js?v=26"></script>
  <script src="js/ref-cache.js?v=26"></script>
  <script src="js/schema.js?v=30"></script>
  <script src="js/rich-text.js?v=26"></script>
  <script src="js/field-types.js?v=26"></script>
  <script src="js/crud.js?v=26"></script>
  <script src="js/city-hub.js?v=27"></script>
  <script src="js/users-hub.js?v=31"></script>
  <script src="js/membership-hub.js?v=31"></script>
  <script src="js/pricing-hub.js?v=31"></script>
  <script src="js/nav.js?v=30"></script>
  <script src="js/admin.js?v=30"></script>
  </body>
</html>
