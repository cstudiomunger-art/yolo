<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChinaGo · Genius Bar 客服工作台</title>
<style>
  :root{--bg:#f4f6f9;--panel:#fff;--ink:#1a2332;--muted:#6a7686;--border:#d0dae6;
    --accent:#c45c26;--accent2:#2F6B43;--online:#3fb950;--busy:#d8a13a;--danger:#e5534b;--radius:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  /* login */
  .login{height:100vh;display:flex;align-items:center;justify-content:center}
  .login .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:30px;width:340px;max-width:92vw}
  .login h1{font-size:20px;margin-bottom:4px}
  .login p{font-size:12px;color:var(--muted);margin-bottom:18px}
  .login input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:9px;font-size:14px;margin-bottom:10px}
  .login button{width:100%;padding:12px;border:none;border-radius:9px;background:var(--ink);color:#fff;font-size:14px;font-weight:600}
  .err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}
  /* console */
  .console{display:none;height:100vh;grid-template-rows:auto 1fr}
  .topbar{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--panel);border-bottom:1px solid var(--border)}
  .topbar .logo{font-weight:700}.topbar .logo span{color:var(--accent)}
  .topbar .who{font-size:12px;color:var(--muted)}
  .agentAvatar{width:32px;height:32px;border-radius:50%;background:var(--ink);background-size:cover;background-position:center;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex:none;border:1px solid var(--border)}
  .agentAvatar:hover{opacity:.85}
  .topbar .spacer{flex:1}
  .statusbtn{border:1px solid var(--border);background:#fff;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;background:#bbb;display:inline-block}
  .dot.online{background:var(--online)}.dot.busy{background:var(--busy)}
  .signout{border:none;background:none;color:var(--muted);font-size:12px;text-decoration:underline}
  .main{display:grid;grid-template-columns:320px 1fr;min-height:0}
  .list{border-right:1px solid var(--border);background:var(--panel);overflow-y:auto}
  .list h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 16px 8px}
  .listhead{display:flex;gap:6px;padding:12px 16px 8px;position:sticky;top:0;background:var(--panel);z-index:1}
  .seg{border:1px solid var(--border);background:#fff;border-radius:16px;padding:5px 12px;font-size:12px;color:var(--muted)}
  .seg.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .imgbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:16px;background:#fff;flex:none}
  .imgbtn:hover{border-color:var(--ink)}
  .bub .time{font-size:9px;color:var(--muted);margin-top:3px}
  .conv{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
  .conv:hover{background:#f0f3f7}
  .conv.active{background:#eef4ff}
  .conv.emergency{background:#fdeeea}
  .conv .t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .conv .s{font-size:11px;color:var(--muted);margin-top:2px}
  .badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--danger);color:#fff}
  .chat{display:flex;flex-direction:column;min-height:0;background:#eef0f3}
  .chat .hd{padding:11px 16px;background:var(--panel);border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
  .ctx{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex}.row.me{justify-content:flex-end}
  .bub{max-width:74%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45;background:#fff;border:1px solid var(--border)}
  .row.me .bub{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .bub img{max-width:200px;border-radius:8px;display:block}
  .tx{font-size:10px;color:var(--muted);margin-top:4px}
  .row.me .tx{text-align:right}
  .bub .tx{font-size:11px;opacity:.7;margin-top:3px}
  .trbtn{background:none;border:none;color:inherit;opacity:.7;text-decoration:underline;font-size:11px;cursor:pointer;padding:0;margin-top:4px;display:inline-block}
  .trbtn.muted{text-decoration:none;cursor:default}
  .compose{display:flex;gap:8px;padding:12px;background:var(--panel);border-top:1px solid var(--border)}
  .compose input{flex:1;padding:10px 13px;border:1px solid var(--border);border-radius:20px;font-size:14px}
  .compose button{border:none;border-radius:20px;padding:0 18px;background:var(--accent2);color:#fff;font-weight:600}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
  .backbtn{display:none;border:none;background:none;color:var(--accent);font-size:13px;margin-right:6px}
  @media(max-width:760px){
    .main{grid-template-columns:1fr}
    .list{display:block}.chat{display:none}
    .console.show-chat .list{display:none}
    .console.show-chat .chat{display:flex}
    .backbtn{display:inline}
  }
</style>
</head>
<body>
  <div class="login" id="login">
    <div class="card">
      <h1>Genius Bar 工作台</h1>
      <p>团队客服登录 · Talk to a Human console</p>
      <input id="email" type="email" placeholder="邮箱 Email" autocomplete="username">
      <input id="password" type="password" placeholder="密码 Password" autocomplete="current-password">
      <button id="loginBtn">登录</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div class="console" id="console">
    <div class="topbar">
      <div class="logo">China<span>Go</span> · 客服</div>
      <label for="avatarInput" id="agentAvatar" class="agentAvatar" title="点击上传/更换头像"></label>
      <input id="avatarInput" type="file" accept="image/*" style="display:none">
      <div class="who" id="who"></div>
      <div class="spacer"></div>
      <button class="statusbtn" id="autoTrBtn" title="自动翻译收到的消息"><span id="autoTrText">🌐 自动翻译：关</span></button>
      <button class="statusbtn" id="statusBtn"><span class="dot" id="statusDot"></span><span id="statusText">离线</span></button>
      <button class="signout" id="signout">登出</button>
    </div>
    <div class="main">
      <div class="list">
        <div class="listhead">
          <button class="seg on" id="segOpen">进行中</button>
          <button class="seg" id="segClosed">已结束</button>
        </div>
        <div id="convList"></div>
      </div>
      <div class="chat" id="chatPane">
        <div class="empty" id="chatEmpty">选择左侧一个会话开始</div>
        <div id="chatActive" style="display:none;flex:1;flex-direction:column;min-height:0">
          <div class="hd" style="display:flex;align-items:center;gap:8px">
            <button class="backbtn" id="backBtn">‹ 会话</button>
            <div style="flex:1;min-width:0">
              <span id="chatTitle"></span>
              <div class="ctx" id="chatCtx"></div>
              <div class="ctx" id="userTyping" style="color:var(--accent2)"></div>
            </div>
            <button id="closeBtn" style="border:1px solid var(--border);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px">结束会话</button>
            <button id="deleteBtn" style="display:none;border:1px solid var(--danger);color:var(--danger);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px">删除记录</button>
          </div>
          <div class="msgs" id="msgs"></div>
          <div class="compose" id="composeBar">
            <label for="imgInput" class="imgbtn" title="发送图片">📎</label>
            <input id="imgInput" type="file" accept="image/*" style="display:none">
            <input id="reply" placeholder="回复（中文，自动翻译给用户）">
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script>
  <script src="./config.js"></script>
  <script>
  (function(){
    const cfg = window.YOLO_SUPPORT_CONFIG || {};
    const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
    });
    let agent = null, activeConv = null, pollTimer = null;
    let listChannel = null, msgChannel = null;
    let statusFilter = "open";
    const notified = {};          // conversation_id → last notified message id
    let audioCtx = null;
    let autoTranslate = localStorage.getItem("autoTranslate") === "1";  // 接收端·默认关
    const translatingMsg = new Set();   // message ids being translated
    const shownT = new Set();            // message ids whose translation is shown (auto off)
    let msgById = {};
    let _msgGen = 0;                      // render generation — drops superseded loadMessages
    const _signedCache = {};              // image path -> { url, at } signed-URL cache (~50min)
    const $ = (id) => document.getElementById(id);

    // Reuse signed image URLs so re-renders don't re-sign every image (jank source).
    async function signedImage(path){
      const c = _signedCache[path];
      if (c && Date.now() - c.at < 50*60*1000) return c.url;
      const { data } = await sb.storage.from("chat-images").createSignedUrl(path, 3600);
      const url = data ? data.signedUrl : "";
      if (url) _signedCache[path] = { url, at: Date.now() };
      return url;
    }

    function beep(){
      try{
        audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = "sine"; o.frequency.value = 880; g.gain.value = 0.08;
        o.start(); o.stop(audioCtx.currentTime + 0.15);
      }catch(e){}
    }
    function desktopNotify(title, body){
      try{ if ("Notification" in window && Notification.permission === "granted") new Notification(title, { body }); }catch(e){}
    }

    async function init(){
      const { data:{ session } } = await sb.auth.getSession();
      if (session) await onLoggedIn(session);
    }

    $("loginBtn").onclick = async () => {
      $("loginErr").textContent = "";
      const { data, error } = await sb.auth.signInWithPassword({ email: $("email").value.trim(), password: $("password").value });
      if (error){ $("loginErr").textContent = error.message; return; }
      await onLoggedIn(data.session);
    };
    $("signout").onclick = async () => { if(agent) await setStatus("offline"); await sb.auth.signOut(); location.reload(); };

    async function onLoggedIn(session){
      const { data: agents, error } = await sb.from("support_agents").select("*").eq("user_id", session.user.id).limit(1);
      if (error || !agents || !agents.length){ $("loginErr").textContent = "此账号不是客服坐席（support_agents 无记录）。"; await sb.auth.signOut(); return; }
      agent = agents[0];
      $("login").style.display = "none";
      $("console").style.display = "grid";
      $("who").textContent = agent.name + " · " + (agent.role || "");
      renderAgentAvatar();
      renderAutoTr();
      $("autoTrBtn").onclick = () => {
        autoTranslate = !autoTranslate;
        localStorage.setItem("autoTranslate", autoTranslate ? "1" : "0");
        renderAutoTr();
        if (activeConv) loadMessages();
      };
      $("msgs").addEventListener("click", (e) => {
        const tr = e.target.closest("[data-tr]"); const tg = e.target.closest("[data-toggle]");
        if (tr) { const m = msgById[tr.dataset.tr]; if (m) translateMessageRow(m); }
        else if (tg) { const id = tg.dataset.toggle; shownT.has(id) ? shownT.delete(id) : shownT.add(id); loadMessages(); }
      });
      renderStatus();
      if ("Notification" in window && Notification.permission === "default") { try { Notification.requestPermission(); } catch(e){} }
      $("segOpen").onclick = () => { statusFilter = "open"; $("segOpen").classList.add("on"); $("segClosed").classList.remove("on"); loadConversations(); };
      $("segClosed").onclick = () => { statusFilter = "closed"; $("segClosed").classList.add("on"); $("segOpen").classList.remove("on"); loadConversations(); };
      await loadConversations();
      subscribeListRealtime();
      pollTimer = setInterval(tick, 15000);   // realtime primary; 15s safety net
    }

    // Realtime: list of conversations + any message (RLS limits to this agent's rows).
    function subscribeListRealtime(){
      if (listChannel) sb.removeChannel(listChannel);
      listChannel = sb.channel("support-list-rt")
        .on("postgres_changes", { event:"*", schema:"public", table:"support_conversations" }, () => loadConversations())
        .on("postgres_changes", { event:"*", schema:"public", table:"support_messages" }, () => loadConversations())
        .subscribe();
    }
    function subscribeMsgRealtime(convId){
      if (msgChannel) sb.removeChannel(msgChannel);
      msgChannel = sb.channel("support-msg-" + convId)
        .on("postgres_changes",
            { event:"*", schema:"public", table:"support_messages", filter:`conversation_id=eq.${convId}` },
            () => { loadMessages(); })
        .on("postgres_changes",
            { event:"*", schema:"public", table:"support_conversations", filter:`id=eq.${convId}` },
            () => { refreshActive(); })
        .subscribe();
    }

    function renderAgentAvatar(){
      const el = $("agentAvatar");
      if (agent && agent.avatar_url){ el.style.backgroundImage = `url('${agent.avatar_url}')`; el.textContent = ""; }
      else { el.style.backgroundImage = ""; el.textContent = ((agent && (agent.avatar_seed || (agent.name||"")[0])) || "?"); }
    }

    $("avatarInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if(!file || !agent) return;
      $("avatarInput").value = "";
      const { data:{ session } } = await sb.auth.getSession();
      const path = `${session.user.id}/agent-avatar.jpg`;
      const { error: upErr } = await sb.storage.from("avatars").upload(path, file, { upsert: true, contentType: file.type || "image/jpeg" });
      if (upErr){ alert("头像上传失败: " + upErr.message); return; }
      const pub = sb.storage.from("avatars").getPublicUrl(path).data.publicUrl;
      const url = pub + "?t=" + Date.now();   // cache-bust so the new image shows immediately
      const { error } = await sb.from("support_agents").update({ avatar_url: url }).eq("id", agent.id);
      if (error){ alert("头像保存失败: " + error.message); return; }
      agent.avatar_url = url;
      renderAgentAvatar();
    });

    function renderAutoTr(){
      $("autoTrText").textContent = autoTranslate ? "🌐 自动翻译：开" : "🌐 自动翻译：关";
    }

    // Translate one message into the recipient's language (user→zh, agent→en) and persist.
    async function translateMessageRow(m){
      if (translatingMsg.has(m.id) || !(m.body_original||"").trim()) return;
      const target = m.sender_type === "user" ? "zh" : "en";
      translatingMsg.add(m.id);
      await loadMessages();
      const t = await translate(m.body_original, target);
      translatingMsg.delete(m.id);
      if (t) await sb.from("support_messages").update({ body_translated: t }).eq("id", m.id);
      await loadMessages();
    }

    function renderStatus(){
      const s = agent.status || "offline";
      $("statusDot").className = "dot " + (s === "offline" ? "" : s);
      $("statusText").textContent = s === "online" ? "在线" : s === "busy" ? "忙碌" : "离线";
    }
    $("statusBtn").onclick = async () => {
      const next = agent.status === "online" ? "busy" : agent.status === "busy" ? "offline" : "online";
      await setStatus(next);
    };
    async function setStatus(s){
      const { error } = await sb.from("support_agents").update({ status: s, updated_at: new Date().toISOString() }).eq("id", agent.id);
      if(!error){ agent.status = s; renderStatus(); }
    }

    function convName(c){
      const ctx = c.context_json || {};
      return ctx.user_name || ctx.user_email || ("用户 " + c.user_id.slice(0,8));
    }

    async function loadConversations(){
      const { data } = await sb.from("support_conversations")
        .select("*").eq("status", statusFilter).is("agent_deleted_at", null)
        .order("priority",{ascending:false}).order("updated_at",{ascending:false}).limit(100);
      const rows = (data||[]).filter(c =>
        statusFilter === "closed"
          ? c.agent_id === agent.id
          : (c.agent_id === agent.id || c.agent_id === null || c.priority === "emergency")
      );
      rows.sort((a,b)=> (a.priority==="emergency"?-1:0) - (b.priority==="emergency"?-1:0));

      // One query for latest messages across the listed conversations → preview map.
      const ids = rows.map(c => c.id);
      const preview = {}, allMsgs = {};
      if (ids.length){
        const { data: msgs } = await sb.from("support_messages")
          .select("conversation_id,sender_type,body_original,image_url,created_at")
          .in("conversation_id", ids).order("created_at",{ascending:false}).limit(400);
        (msgs||[]).forEach(m => {
          if(!preview[m.conversation_id]) preview[m.conversation_id] = m;
          (allMsgs[m.conversation_id] = allMsgs[m.conversation_id] || []).push(m);
        });
      }

      // Ping the agent on a newly-arrived user message (skip the very first load).
      if (statusFilter === "open"){
        rows.forEach(c => {
          const last = preview[c.id];
          if (!last || last.sender_type !== "user") return;
          if (notified[c.id] === undefined) { notified[c.id] = last.created_at; return; }
          if (last.created_at > notified[c.id] && (!activeConv || activeConv.id !== c.id)) {
            notified[c.id] = last.created_at;
            beep();
            desktopNotify(convName(c), last.image_url ? "发来一张图片" : (last.body_original||"").slice(0,40));
          } else {
            notified[c.id] = last.created_at;
          }
        });
      }

      const list = $("convList"); list.innerHTML = "";
      rows.forEach(c => {
        const last = preview[c.id];
        const snippet = last ? (last.image_url ? "📷 图片" : (last.sender_type==="agent"?"你: ":"") + (last.body_original||"").slice(0,24)) : "(暂无消息)";
        const readAt = c.agent_last_read_at ? new Date(c.agent_last_read_at).getTime() : 0;
        const unread = (allMsgs[c.id]||[]).filter(m => m.sender_type==="user" && new Date(m.created_at).getTime() > readAt).length;
        const el = document.createElement("div");
        el.className = "conv" + (activeConv && activeConv.id===c.id ? " active":"") + (c.priority==="emergency"?" emergency":"");
        el.innerHTML = `<div class="t">${c.priority==="emergency"?'<span class="badge">SOS</span>':''} ${convName(c).replace(/</g,"&lt;")}
            ${unread>0?`<span class="badge" style="background:var(--accent)">${unread}</span>`:''}</div>
          <div class="s">${snippet.replace(/</g,"&lt;")}</div>
          <div class="s">${c.agent_id?'已接入':'待接入'} · ${new Date(c.updated_at).toLocaleString()}</div>`;
        el.onclick = () => openConv(c);
        list.appendChild(el);
      });
    }

    async function openConv(c){
      activeConv = c;
      if (!c.agent_id){ await sb.from("support_conversations").update({ agent_id: agent.id }).eq("id", c.id); c.agent_id = agent.id; }
      $("chatEmpty").style.display = "none";
      $("chatActive").style.display = "flex";
      $("console").classList.add("show-chat");
      $("chatTitle").textContent = convName(c);
      const ctx = c.context_json || {};
      const ctxBits = Object.entries(ctx).filter(([k]) => k !== "user_name" && k !== "user_email").map(([k,v]) => `${k}: ${v}`);
      $("chatCtx").textContent = (ctx.user_email ? ctx.user_email + " · " : "") + (ctxBits.length ? ctxBits.join(" · ") : "");
      $("userTyping").textContent = "";
      // Closed = read-only: hide compose + 结束会话, show 删除记录.
      const closed = c.status === "closed";
      $("composeBar").style.display = closed ? "none" : "flex";
      $("closeBtn").style.display = closed ? "none" : "";
      $("deleteBtn").style.display = closed ? "" : "none";
      await markAgentRead(c.id);
      await loadMessages();
      await loadConversations();
      subscribeMsgRealtime(c.id);
    }
    $("backBtn").onclick = () => $("console").classList.remove("show-chat");

    $("deleteBtn").onclick = async () => {
      if(!activeConv || !confirm("删除这条会话记录？（仅从你的列表移除，后台仍保留）")) return;
      await sb.from("support_conversations").update({ agent_deleted_at: new Date().toISOString() }).eq("id", activeConv.id);
      activeConv = null;
      $("chatActive").style.display = "none";
      $("chatEmpty").style.display = "flex";
      $("console").classList.remove("show-chat");
      await loadConversations();
    };

    async function markAgentRead(id){
      await sb.from("support_conversations").update({ agent_last_read_at: new Date().toISOString() }).eq("id", id);
    }

    $("closeBtn").onclick = async () => {
      if(!activeConv || !confirm("结束这条会话？")) return;
      await sb.from("support_conversations").update({ status: "closed" }).eq("id", activeConv.id);
      activeConv = null;
      $("chatActive").style.display = "none";
      $("chatEmpty").style.display = "flex";
      $("console").classList.remove("show-chat");
      await loadConversations();
    };

    // Agent typing marker (throttled ~3s).
    let lastTyping = 0;
    $("reply").addEventListener("input", async () => {
      if(!activeConv || Date.now() - lastTyping < 3000) return;
      lastTyping = Date.now();
      await sb.from("support_conversations").update({ agent_typing_at: new Date().toISOString() }).eq("id", activeConv.id);
    });

    async function refreshActive(){
      if(!activeConv) return;
      const { data } = await sb.from("support_conversations").select("user_typing_at").eq("id", activeConv.id).single();
      const t = data && data.user_typing_at ? new Date(data.user_typing_at).getTime() : 0;
      $("userTyping").textContent = (Date.now() - t < 6000) ? "用户正在输入…" : "";
      await markAgentRead(activeConv.id);
    }

    async function loadMessages(){
      if(!activeConv) return;
      // Concurrent loadMessages (manual after-send + realtime echo) used to interleave
      // on the shared DOM during the per-image `await`, appending a message twice. Build
      // into a detached fragment and only commit if this is still the latest run.
      const gen = ++_msgGen;
      const convId = activeConv.id;
      const { data } = await sb.from("support_messages").select("*").eq("conversation_id", convId).order("created_at").limit(200);
      if (gen !== _msgGen || !activeConv || activeConv.id !== convId) return;  // superseded
      const frag = document.createDocumentFragment();
      const nextById = {};
      for (const m of (data||[])){
        nextById[m.id] = m;
        const me = m.sender_type === "agent";
        const row = document.createElement("div"); row.className = "row" + (me?" me":"");
        const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : "";
        let inner;
        if (m.image_url){
          const url = await signedImage(m.image_url);
          if (gen !== _msgGen) return;  // a newer render started while signing
          inner = `<img src="${url}" alt="image"><div class="time">${time}</div>`;
        } else {
          const hasT = m.body_translated && m.body_translated !== m.body_original;
          if (autoTranslate && m.sender_type === "user" && !hasT && (m.body_original||"").trim()) row.dataset.needtr = m.id;
          const visT = hasT && (autoTranslate || shownT.has(m.id));
          let ctrl = "";
          if (translatingMsg.has(m.id)) ctrl = `<span class="trbtn muted">翻译中…</span>`;
          else if (!hasT) ctrl = `<button class="trbtn" data-tr="${m.id}">翻译</button>`;
          else if (!autoTranslate) ctrl = `<button class="trbtn" data-toggle="${m.id}">${shownT.has(m.id)?'隐藏译文':'显示译文'}</button>`;
          inner = (m.body_original||"").replace(/</g,"&lt;");
          if (visT) inner += `<div class="tx">🌐 ${m.body_translated.replace(/</g,"&lt;")}</div>`;
          inner += `<div class="time">${time}</div>`;
          if (ctrl) inner += `<div>${ctrl}</div>`;
        }
        row.innerHTML = `<div class="bub">${inner}</div>`;
        frag.appendChild(row);
      }
      if (gen !== _msgGen) return;  // superseded — don't clobber the newer render
      const box = $("msgs");
      box.innerHTML = ""; msgById = nextById;
      box.appendChild(frag);
      box.scrollTop = box.scrollHeight;
      if (autoTranslate) setupAutoTranslateObserver(box);
    }

    // Only auto-translate messages scrolled into view (visible range), so a long
    // history doesn't fire hundreds of translations at once.
    let _trObserver = null;
    function setupAutoTranslateObserver(box){
      if (_trObserver) _trObserver.disconnect();
      _trObserver = new IntersectionObserver((entries) => {
        for (const en of entries){
          if (!en.isIntersecting) continue;
          const id = en.target.dataset.needtr;
          _trObserver.unobserve(en.target);
          const m = msgById[id];
          if (m && !translatingMsg.has(id)) translateMessageRow(m);
        }
      }, { root: box, threshold: 0.1 });
      box.querySelectorAll("[data-needtr]").forEach((el) => _trObserver.observe(el));
    }

    $("sendBtn").onclick = sendReply;
    $("reply").addEventListener("keydown", e => { if(e.key==="Enter") sendReply(); });

    $("imgInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if(!file || !activeConv) return;
      $("imgInput").value = "";
      const path = `${activeConv.id}/${crypto.randomUUID()}.jpg`;
      const { error } = await sb.storage.from("chat-images").upload(path, file, { contentType: file.type || "image/jpeg" });
      if(error){ alert("图片上传失败: " + error.message); return; }
      // Show instantly from the local file (no signing round-trip); loadMessages reuses this.
      _signedCache[path] = { url: URL.createObjectURL(file), at: Date.now() };
      const { data:{ session } } = await sb.auth.getSession();
      await sb.from("support_messages").insert({ conversation_id: activeConv.id, sender_type:"agent", sender_id: session.user.id, image_url: path });
      await sb.from("support_conversations").update({ updated_at: new Date().toISOString() }).eq("id", activeConv.id);
      await loadMessages();
    });
    async function sendReply(){
      const text = $("reply").value.trim();
      if(!text || !activeConv) return;
      $("reply").value = "";
      const { data:{ session } } = await sb.auth.getSession();
      // Send instantly with original only; translation is the receiving side's job.
      await sb.from("support_messages").insert({
        conversation_id: activeConv.id, sender_type: "agent", sender_id: session.user.id,
        body_original: text
      });
      await sb.from("support_conversations").update({ updated_at: new Date().toISOString(), agent_typing_at: null }).eq("id", activeConv.id);
      notifyUser(activeConv.user_id, text);
      await loadMessages();
    }

    async function notifyUser(userId, text){
      try{
        const { data:{ session } } = await sb.auth.getSession();
        await fetch(`${cfg.supabaseUrl}/functions/v1/notify-user`, {
          method:"POST",
          headers:{ "Content-Type":"application/json", "apikey": cfg.supabaseAnonKey, "Authorization":`Bearer ${session.access_token}` },
          body: JSON.stringify({ user_id: userId, title: agent.name || "客服回复", body: text.slice(0,80) })
        });
      }catch(e){ /* push is best-effort */ }
    }

    async function translate(text, target){
      try{
        const { data:{ session } } = await sb.auth.getSession();
        const res = await fetch(`${cfg.supabaseUrl}/functions/v1/chat-translate`, {
          method:"POST",
          headers:{ "Content-Type":"application/json", "apikey": cfg.supabaseAnonKey, "Authorization":`Bearer ${session.access_token}` },
          body: JSON.stringify({ text, target_lang: target })
        });
        const j = await res.json();
        return j.translated || null;
      }catch(e){ return null; }
    }

    async function tick(){ await loadConversations(); if(activeConv){ await loadMessages(); await refreshActive(); } }

    init();
  })();
  </script>
</body>
</html>
