<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>重置密码 · YOLO HAPPY</title>
  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #c8a97e;
      --card: #fff;
      --success: #1b7f4a;
      --error: #b00020;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      line-height: 1.55;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 16px;
      padding: 32px 24px 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .badge {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 20px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .icon.success { background: #e8f6ee; color: var(--success); }
    .icon.error { background: #fdecea; color: var(--error); }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 10px; }
    p { margin: 0 0 12px; color: var(--muted); font-size: 0.95rem; }
    .cta {
      display: block;
      margin-top: 22px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .hint { font-size: 0.8rem; color: #999; margin-top: 18px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <p class="badge">YOLO HAPPY</p>
    <div id="state-success" class="hidden">
      <div class="icon success">✓</div>
      <h1 id="title-success"></h1>
      <p id="msg-success"></p>
      <a id="open-app" class="cta" href="#"></a>
      <p id="hint-success" class="hint"></p>
    </div>
    <div id="state-error" class="hidden">
      <div class="icon error">!</div>
      <h1 id="title-error"></h1>
      <p id="msg-error"></p>
    </div>
  </div>
  <script>
    (function () {
      const lang = (navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en";
      const appScheme = "yoloapp://auth/reset-password";
      const copy = {
        zh: {
          successTitle: "链接验证成功",
          successMsg: "请在 YOLO App 中设置您的新密码。",
          openApp: "打开 YOLO App 设置密码",
          autoOpen: "正在尝试打开 App…",
          hint: "若未自动跳转，请点击上方按钮。",
          errorTitle: "链接无效",
          errorDefault: "重置链接已过期或无效，请重新申请重置密码。",
        },
        en: {
          successTitle: "Link verified",
          successMsg: "Open YOLO App to choose a new password.",
          openApp: "Open YOLO App",
          autoOpen: "Opening the app…",
          hint: "If nothing happens, tap the button above.",
          errorTitle: "Invalid link",
          errorDefault: "This reset link is invalid or expired. Request a new one from the app.",
        },
      };
      const t = copy[lang];

      function parseAuthParams() {
        const hash = (location.hash || "").replace(/^#/, "");
        const search = (location.search || "").replace(/^\?/, "");
        const raw = [hash, search].filter(Boolean).join("&");
        const params = new URLSearchParams(raw);
        const out = {};
        params.forEach(function (v, k) { out[k] = v; });
        return out;
      }

      function appDeepLink(params) {
        const qs = new URLSearchParams(params).toString();
        return appScheme + (qs ? "#" + qs : "");
      }

      const params = parseAuthParams();
      const hasError = Boolean(params.error || params.error_code);
      const hasSession = Boolean(params.access_token);
      const isRecovery = params.type === "recovery" || hasSession;

      if (hasError || (!hasSession && !isRecovery)) {
        document.getElementById("state-error").classList.remove("hidden");
        document.getElementById("title-error").textContent = t.errorTitle;
        document.getElementById("msg-error").textContent =
          params.error_description || params.error || t.errorDefault;
        return;
      }

      document.getElementById("state-success").classList.remove("hidden");
      document.getElementById("title-success").textContent = t.successTitle;
      document.getElementById("msg-success").textContent = t.successMsg;
      document.getElementById("hint-success").textContent = t.hint;

      const deepLink = appDeepLink(params);
      const openApp = document.getElementById("open-app");
      openApp.textContent = t.openApp;
      openApp.href = deepLink;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.getElementById("hint-success").textContent = t.autoOpen;
        setTimeout(function () { window.location.href = deepLink; }, 600);
      }
    })();
  </script>
</body>
</html>
