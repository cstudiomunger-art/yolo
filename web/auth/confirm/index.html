<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email confirmation · YOLO HAPPY</title>
  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #c8a97e;
      --card: #fff;
      --success: #1b7f4a;
      --error: #b00020;
      --warn: #c77700;
      --border: #e4e0da;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      line-height: 1.55;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 16px;
      padding: 32px 24px 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .badge {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 20px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .icon.success { background: #e8f6ee; color: var(--success); }
    .icon.error { background: #fdecea; color: var(--error); }
    .icon.warn { background: #fff4e5; color: var(--warn); }
    .icon.pending { background: #f5f0e8; color: var(--accent); }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 10px; }
    p { margin: 0 0 12px; color: var(--muted); font-size: 0.95rem; }
    .email { color: var(--text); font-weight: 600; word-break: break-all; }
    .cta {
      display: block;
      width: 100%;
      margin-top: 22px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .cta:disabled { opacity: 0.55; cursor: not-allowed; }
    .cta.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 10px;
      font-weight: 500;
    }
    .hint { font-size: 0.8rem; color: #999; margin-top: 18px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <p class="badge">YOLO HAPPY</p>

    <div id="state-confirm" class="hidden">
      <div class="icon pending">✉</div>
      <h1 id="title-confirm"></h1>
      <p id="msg-confirm"></p>
      <button id="btn-confirm" type="button" class="cta"></button>
      <p id="hint-confirm" class="hint"></p>
    </div>

    <div id="state-success" class="hidden">
      <div class="icon success">✓</div>
      <h1 id="title-success"></h1>
      <p id="msg-success"></p>
      <p id="email-success" class="email hidden"></p>
      <a id="open-app" class="cta" href="#"></a>
      <a id="app-store" class="cta secondary hidden" href="#" target="_blank" rel="noopener"></a>
      <p id="hint-success" class="hint"></p>
    </div>

    <div id="state-error" class="hidden">
      <div id="icon-error" class="icon error">!</div>
      <h1 id="title-error"></h1>
      <p id="msg-error"></p>
      <a id="retry-signin" class="cta secondary" href="/"></a>
    </div>

    <div id="state-loading" class="hidden">
      <div class="icon pending">…</div>
      <h1 id="title-loading"></h1>
      <p id="msg-loading"></p>
    </div>
  </div>

  <script src="/config.js"></script>
  <script src="/auth/auth-callback.js"></script>
  <!-- Prefer self-hosted UMD for China (avoid jsDelivr). Place dist at /vendor/supabase.min.js -->
  <script src="/vendor/supabase.min.js"></script>
  <script type="module">
    const createClient = window.supabase && window.supabase.createClient;
    if (!createClient) {
      throw new Error("Missing /vendor/supabase.min.js");
    }

    const cfg = window.YOLO_WEB_CONFIG || {};
    const auth = window.YOLOAuthCallback;
    const appScheme = "yoloapp://auth/confirm";

    const copy = {
      confirmTitle: "Confirm your email",
      confirmMsg: "Tap below to verify your sign-up link. This link works once — complete within the time limit shown in your email.",
      confirmBtn: "Confirm email",
      confirmHint: "Do not forward this link. Email security scanners can invalidate it.",
      verifyingTitle: "Verifying…",
      verifyingMsg: "Please wait.",
      successTitle: "Email confirmed",
      successMsg: "Your account is verified. Tap Open YOLO App to continue in the app.",
      openApp: "Open YOLO App",
      getApp: "Get the app",
      hint: "If the app does not open, switch back to YOLO HAPPY and tap I've confirmed — Sign in.",
      expiredTitle: "Confirmation link expired",
      expiredMsg: "This confirmation link has timed out. Open YOLO HAPPY and tap Resend confirmation email to get a new one.",
      failedTitle: "Confirmation failed",
      failedMsg: "We couldn't confirm your email. Please request a new confirmation email from the app.",
      invalidTitle: "Invalid confirmation link",
      invalidMsg: "Open the link from your sign-up email instead of visiting this page directly.",
      configError: "Missing page configuration. Please try again later.",
      retry: "Back to home",
    };

    const params = auth.parseAuthParams();

    const states = {
      confirm: document.getElementById("state-confirm"),
      success: document.getElementById("state-success"),
      error: document.getElementById("state-error"),
      loading: document.getElementById("state-loading"),
    };

    function showState(name) {
      Object.keys(states).forEach(function (key) {
        states[key].classList.toggle("hidden", key !== name);
      });
    }

    function isExpiredSignal(errorCode, description, message) {
      const code = (errorCode || "").toLowerCase();
      const text = [description, message].filter(Boolean).join(" ").toLowerCase();
      return code === "otp_expired"
        || text.includes("expired")
        || text.includes("otp has expired");
    }

    function resolveErrorFromParams(params) {
      if (isExpiredSignal(params.error_code, params.error_description, params.error)) {
        return { title: copy.expiredTitle, message: copy.expiredMsg, expired: true };
      }
      if (auth.hasAuthError(params)) {
        return { title: copy.failedTitle, message: copy.failedMsg, expired: false };
      }
      return { title: copy.invalidTitle, message: copy.invalidMsg, expired: false };
    }

    function resolveErrorFromVerifyError(err) {
      const code = (err && err.code ? String(err.code) : "").toLowerCase();
      const message = (err && err.message ? String(err.message) : "");
      if (isExpiredSignal(code, message, message)) {
        return { title: copy.expiredTitle, message: copy.expiredMsg, expired: true };
      }
      return { title: copy.failedTitle, message: copy.failedMsg, expired: false };
    }

    function showError(resolved) {
      showState("error");
      const icon = document.getElementById("icon-error");
      icon.className = resolved.expired ? "icon warn" : "icon error";
      icon.textContent = resolved.expired ? "⏱" : "!";
      document.getElementById("title-error").textContent = resolved.title;
      document.getElementById("msg-error").textContent = resolved.message;
      document.getElementById("retry-signin").textContent = copy.retry;
      document.getElementById("retry-signin").href = "/";
    }

    function showLoading() {
      showState("loading");
      document.getElementById("title-loading").textContent = copy.verifyingTitle;
      document.getElementById("msg-loading").textContent = copy.verifyingMsg;
    }

    if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
      showError({ title: copy.failedTitle, message: copy.configError, expired: false });
      throw new Error("missing config");
    }

    if (auth.hasAuthError(params)) {
      showError(resolveErrorFromParams(params));
      throw new Error("auth error in url");
    }

    if (!auth.hasAuthPayload(params)) {
      showError(resolveErrorFromParams(params));
      throw new Error("invalid link");
    }

    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        detectSessionInUrl: false,
        persistSession: true,
        autoRefreshToken: false,
      },
    });

    let verifiedEmail = null;
    let sessionTokens = null;

    async function establishSignupSession() {
      if (params.token_hash && params.type) {
        const { data, error } = await supabase.auth.verifyOtp({
          token_hash: params.token_hash,
          type: params.type,
        });
        if (error) throw error;
        verifiedEmail = data.user?.email || null;
        sessionTokens = data.session
          ? { access_token: data.session.access_token, refresh_token: data.session.refresh_token }
          : null;
        return;
      }

      if (params.access_token && params.refresh_token) {
        const { data, error } = await supabase.auth.setSession({
          access_token: params.access_token,
          refresh_token: params.refresh_token,
        });
        if (error) throw error;
        verifiedEmail = data.user?.email || auth.decodeJwtEmail(params.access_token);
        sessionTokens = {
          access_token: params.access_token,
          refresh_token: params.refresh_token,
        };
        return;
      }

      if (params.code) {
        const { data, error } = await supabase.auth.exchangeCodeForSession(params.code);
        if (error) throw error;
        verifiedEmail = data.user?.email || null;
        sessionTokens = data.session
          ? { access_token: data.session.access_token, refresh_token: data.session.refresh_token }
          : null;
        return;
      }

      throw new Error(copy.failedMsg);
    }

    function buildDeepLink() {
      if (sessionTokens) {
        return auth.appDeepLink(appScheme, {
          access_token: sessionTokens.access_token,
          refresh_token: sessionTokens.refresh_token,
          type: params.type || "signup",
        });
      }
      return auth.appDeepLinkFromLocation(appScheme);
    }

    function showSuccess() {
      showState("success");
      document.getElementById("title-success").textContent = copy.successTitle;
      document.getElementById("msg-success").textContent = copy.successMsg;
      document.getElementById("hint-success").textContent = copy.hint;

      if (verifiedEmail) {
        const el = document.getElementById("email-success");
        el.textContent = verifiedEmail;
        el.classList.remove("hidden");
      }

      const deepLink = buildDeepLink();
      const openApp = document.getElementById("open-app");
      openApp.textContent = copy.openApp;
      openApp.href = deepLink;
      // User gesture only — do not auto-redirect (iOS often blocks setTimeout jumps).
      openApp.onclick = function (e) {
        e.preventDefault();
        window.location.href = deepLink;
        return false;
      };

      if (cfg.appStoreUrl && !String(cfg.appStoreUrl).includes("0000000000")) {
        const store = document.getElementById("app-store");
        store.href = cfg.appStoreUrl;
        store.textContent = copy.getApp;
        store.classList.remove("hidden");
      }
    }

    showState("confirm");
    document.getElementById("title-confirm").textContent = copy.confirmTitle;
    document.getElementById("msg-confirm").textContent = copy.confirmMsg;
    document.getElementById("btn-confirm").textContent = copy.confirmBtn;
    document.getElementById("hint-confirm").textContent = copy.confirmHint;

    document.getElementById("btn-confirm").addEventListener("click", async function () {
      const btn = document.getElementById("btn-confirm");
      btn.disabled = true;
      showLoading();

      try {
        await establishSignupSession();
        showSuccess();
      } catch (err) {
        showError(resolveErrorFromVerifyError(err));
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
