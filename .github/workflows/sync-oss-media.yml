name: Sync Supabase Storage to OSS

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.SUPABASE_URL }}" || echo "::warning::SUPABASE_URL secret is empty"
          test -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" || { echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is empty"; exit 1; }
          test -n "${{ secrets.OSS_ACCESS_KEY_ID }}" || { echo "::error::OSS_ACCESS_KEY_ID secret is empty"; exit 1; }
          test -n "${{ secrets.OSS_ACCESS_KEY_SECRET }}" || { echo "::error::OSS_ACCESS_KEY_SECRET secret is empty"; exit 1; }
          test -n "${{ secrets.OSS_BUCKET }}" || { echo "::error::OSS_BUCKET secret is empty"; exit 1; }
          test -n "${{ secrets.OSS_REGION }}" || { echo "::error::OSS_REGION secret is empty"; exit 1; }

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Sync to OSS
        working-directory: scripts
        run: npm run sync:oss
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}

      - name: Upload sync report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: storage-oss-sync-report
          path: scripts/generated/storage_oss_sync_report.json
          if-no-files-found: ignore
