# Deploy the Vue 3 CMS (admin-vue/) to Cloudflare Worker「yoloadmin-vue」on push to main.
# Required GitHub secret: CLOUDFLARE_API_TOKEN
# Optional: SUPABASE_URL, SUPABASE_ANON_KEY (else falls back to the public publishable key)

name: Deploy Admin CMS (Vue)

on:
  push:
    branches: [main]
    paths:
      - "admin-vue/**"
      - "wrangler.admin-vue.jsonc"
      - ".github/workflows/deploy-admin-vue.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build admin-vue
        working-directory: admin-vue
        run: |
          npm install
          npm run build
        env:
          # Public anon / publishable key — safe to embed in the browser bundle.
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://edwvrriuwzaaqznklrgi.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_b4CZMaImh7KsCVx_uufaGw_h3-HEZPZ' }}

      - name: Check Cloudflare API token
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::未配置 GitHub Secret「CLOUDFLARE_API_TOKEN」。"
            echo "请打开：仓库 Settings → Secrets and variables → Actions → New repository secret"
            echo "Token 在 Cloudflare → My Profile → API Tokens → Create Token（模板：Edit Cloudflare Workers）"
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.admin-vue.jsonc

      - name: Deployment note
        if: success()
        run: |
          echo "Vue CMS deployed to Worker yoloadmin-vue."
          echo "URL: https://yoloadmin-vue.cstudiomunger.workers.dev"
