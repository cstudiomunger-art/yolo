# Deploy the marketing site to Cloudflare Worker「yolo-site」on push to main.
# Mirrors deploy-admin.yml / deploy-support.yml.
# Required GitHub secret: CLOUDFLARE_API_TOKEN
# Optional secrets: SUPABASE_URL, SUPABASE_ANON_KEY (else the committed publishable
#   defaults in the fetch scripts are used — read-only, RLS-guarded).
# Optional repo variable: SITE_URL (canonical/sitemap base; defaults to placeholder).

name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "wrangler.site.jsonc"
      - "YOLO/Models/ISO3166Countries.swift"
      - ".github/workflows/deploy-site.yml"

  # Manual trigger — use this to redeploy after a CMS content change (no code push needed).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: site

      - name: Build site (fetches fresh Supabase snapshot, then astro build)
        run: npm run build
        working-directory: site
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Check Cloudflare API token
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::未配置 GitHub Secret「CLOUDFLARE_API_TOKEN」。"
            echo "请打开：仓库 Settings → Secrets and variables → Actions → New repository secret"
            echo "Token 在 Cloudflare → My Profile → API Tokens → Create Token（模板：Edit Cloudflare Workers）"
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.site.jsonc

      - name: Deployment note
        if: success()
        run: |
          echo "Site deployed to Worker yolo-site."
          echo "Open Cloudflare Dashboard → Workers & Pages → yolo-site for the URL."
